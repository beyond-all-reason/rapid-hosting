---
argument_specs:
  main:
    options:
      domain_name:
        required: true
        type: 'str'
        description: 'Full qialified domain name for repos'
      www_root:
        required: true
        type: 'str'
        description: 'HTTP root for repos'
      repos:
        required: true
        type: 'list'
        description: 'List of repos to set up'
        elements: 'dict'
        options:
          name:
            required: true
            type: 'str'
            description: 'Name of package'
          origin:
            required: true
            type: 'str'
            description: 'Git repo url'
          branch:
            required: true
            type: 'str'
            description: 'Primary branch to clone and build periodically'
          branches:
            required: false
            type: 'list'
            elements: 'str'
            description: 'Branches that are allowed to be built for this repo (defaults to the primary branch)'
